<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 320">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7b2ff7;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="320" rx="16" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#00d2ff" stroke-width="0.5">
    <line x1="0" y1="40" x2="960" y2="40"/><line x1="0" y1="80" x2="960" y2="80"/>
    <line x1="0" y1="120" x2="960" y2="120"/><line x1="0" y1="160" x2="960" y2="160"/>
    <line x1="0" y1="200" x2="960" y2="200"/><line x1="0" y1="240" x2="960" y2="240"/>
    <line x1="0" y1="280" x2="960" y2="280"/>
    <line x1="120" y1="0" x2="120" y2="320"/><line x1="240" y1="0" x2="240" y2="320"/>
    <line x1="360" y1="0" x2="360" y2="320"/><line x1="480" y1="0" x2="480" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/><line x1="720" y1="0" x2="720" y2="320"/>
    <line x1="840" y1="0" x2="840" y2="320"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="960" height="3" rx="1" fill="url(#accent)"/>

  <!-- Lightning bolt icon -->
  <g transform="translate(60, 50)" filter="url(#glow-filter)">
    <polygon points="55,0 20,70 45,70 30,120 80,50 52,50 70,0" fill="url(#accent)"/>
  </g>

  <!-- Title -->
  <text x="160" y="95" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="62" font-weight="800" fill="#ffffff" filter="url(#shadow)">hurl</text>
  <text x="330" y="95" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="62" font-weight="800" fill="url(#accent)" filter="url(#shadow)">x</text>

  <!-- Tagline -->
  <text x="160" y="130" font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" font-size="18" fill="#8888aa" letter-spacing="3">CHAIN · TRACE · CONQUER</text>

  <!-- Terminal window -->
  <g transform="translate(60, 160)">
    <!-- Terminal chrome -->
    <rect width="840" height="130" rx="8" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
    <circle cx="20" cy="16" r="5" fill="#ff5f57"/>
    <circle cx="38" cy="16" r="5" fill="#febc2e"/>
    <circle cx="56" cy="16" r="5" fill="#28c840"/>

    <!-- Terminal content line 1: import -->
    <text x="16" y="48" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#7ee787">import</text>
    <text x="72" y="48" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#c9d1d9"> "auth.hurlx"</text>
    <text x="190" y="48" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#484f58">→ modular imports</text>

    <!-- Terminal content line 2: request -->
    <text x="16" y="70" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#79c0ff">GET</text>
    <text x="48" y="70" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#c9d1d9"> https://api.example.com/users</text>
    <text x="380" y="70" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#484f58">→ chain requests</text>

    <!-- Terminal content line 3: trace -->
    <text x="16" y="92" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#d2a8ff">[trace]</text>
    <text x="76" y="92" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#c9d1d9"> { status: 200, captures: { id: 42 } }</text>
    <text x="500" y="92" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#484f58">→ step-by-step trace</text>

    <!-- Terminal content line 4: result -->
    <text x="16" y="114" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#ffa657">200</text>
    <text x="48" y="114" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#28c840"> ✓</text>
    <text x="72" y="114" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="13" fill="#484f58">assertions passed</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="317" width="960" height="3" rx="1" fill="url(#accent)"/>

  <!-- Version badge -->
  <g transform="translate(720, 55)">
    <rect width="180" height="28" rx="14" fill="#161b22" stroke="#30363d"/>
    <text x="90" y="19" font-family="'SF Mono', monospace" font-size="12" fill="#8b949e" text-anchor="middle">⚡ Enhanced Hurl Engine</text>
  </g>
</svg>
